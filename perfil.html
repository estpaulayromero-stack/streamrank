<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamRank - Perfil</title>

  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/registro.css"/>
  <link rel="stylesheet" href="css/perfil.css"/>

</head>

<body>

<header class="topbar">
  <div class="topbar-inner">

    <div class="brand" aria-label="StreamRank">
      <span class="brand-icon">
        <img src="assets/icons/Clapperboard.svg" alt="StreamRank icon"/>
      </span>

      <span class="brand-title">
        <span>Stream</span>
        <span>Rank</span>
      </span>
    </div>

    <div class="header-nav-row">

      <nav class="main-nav" aria-label="Navegación principal">

        <a href="index.html" class="nav-link">Inicio</a>
        <a href="top10.html" class="nav-link">Top 10</a>

        <a href="mis-listas.html" class="nav-link" id="linkMisListas">
          <span class="nav-icon">
            <img src="assets/icons/Menu.svg" alt="Mis Listas icon"/>
          </span>
          Mis Listas
        </a>

      </nav>

      <form class="search-form" id="searchForm">

        <label class="search-field">

          <span class="search-icon">
            <img src="assets/icons/Busqueda.svg" alt="Buscar icon"/>
          </span>

          <input
            id="searchInput"
            type="search"
            placeholder="Buscar"
            aria-label="Buscar"
            autocomplete="off"
          />

        </label>

      </form>

    </div>

    <button id="btnIngresar" class="profile-button" type="button">
      Ingresar
    </button>

  </div>
</header>

<main class="page-content">

<section class="perfil-page">

  <div id="ajustes-titulo" class="perfil-header" hidden>

    <div>

      <h1>Ajustes de tu perfil</h1>

      <p class="perfil-subtitle">
        Actualiza tu nombre, foto y contraseña.
      </p>

    </div>

    <div id="ajustes-inicial" class="perfil-avatar">
      U
    </div>

  </div>


  <div id="noSesionView" class="perfil-no-sesion" hidden>

    <div>

      <h2 class="perfil-login-title">
        Inicia sesión para editar tu perfil
      </h2>

      <p class="perfil-login-text">
        Tu información de usuario se guarda en tu cuenta y podrás usarla en todas las páginas.
      </p>

    </div>

    <button class="modal-btn-ingresar" type="button" onclick="abrirModal()">
      Ingresar
    </button>

  </div>


  <div id="ajustes-cuenta" class="perfil-panel" hidden>

    <div class="perfil-form">

      <div class="modal-campo">

        <label class="modal-label" for="ajustes-email">
          Correo electrónico
        </label>

        <div class="modal-input-wrapper">

          <span class="modal-input-icono">✉</span>

          <input
            class="modal-input"
            id="ajustes-email"
            type="email"
            readonly
          />

        </div>

      </div>

      <div class="modal-campo">

        <label class="modal-label" for="ajustes-username">
          Nombre personalizado
        </label>

        <div class="modal-input-wrapper">

          <span class="modal-input-icono">👤</span>

          <input
            class="modal-input"
            id="ajustes-username"
            type="text"
            placeholder="Tu nombre visible"
          />

        </div>

      </div>

      <div class="modal-campo">

        <label class="modal-label" for="ajustes-foto-url">
          URL de foto
        </label>

        <div class="modal-input-wrapper">

          <span class="modal-input-icono">🖼️</span>

          <input
            class="modal-input"
            id="ajustes-foto-url"
            type="url"
            placeholder="https://..."
          />

        </div>

      </div>

      <div class="modal-campo">

        <label class="modal-label" for="ajustes-password">
          Nueva contraseña
        </label>

        <div class="modal-input-wrapper">

          <span class="modal-input-icono">🔒</span>

          <input
            class="modal-input"
            id="ajustes-password"
            type="password"
            placeholder="Dejar vacío para no cambiar"
          />

        </div>

      </div>

      <div id="ajustes-aviso" class="perfil-message">
        Cambios guardados correctamente.
      </div>

    </div>

    <div class="perfil-actions">

      <button
        id="btnGuardarAjustes"
        class="modal-btn-ingresar"
        type="button">

        Guardar cambios

      </button>

      <button
        id="btnCerrarSesionAjustes"
        class="btn-secondary"
        type="button">

        Cerrar sesión

      </button>

    </div>

  </div>

</section>

</main>

<div id="modalOverlay" class="modal-overlay" onclick="cerrarModal()" hidden></div>

<script src="js/auth.js"></script>
<script src="js/search.js"></script>

</body>
</html>
